<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f0f0f0; }
        .total { font-weight: bold; }
        form { margin-bottom: 1em; }
        input[type="text"], input[type="number"] { padding: 4px; }
        input[type="submit"] { padding: 4px 12px; }
    </style>
</head>
<body>
<h2>Expense Tracker</h2>
<form th:action="@{/add}" method="post">
    <label>Description: <input type="text" name="description" required></label>
    <label>Amount: <input type="number" name="amount" step="0.01" required></label>
    <input type="submit" value="Add Expense">
</form>
<table>
    <thead>
    <tr><th>Description</th><th>Amount (R$)</th></tr>
    </thead>
    <tbody>
    <tr th:each="expense : ${expenses}">
        <td th:text="${expense.description}"></td>
        <td th:text="${#numbers.formatDecimal(expense.amount, 1, 'COMMA', 2, 'POINT')}"></td>
    </tr>
    </tbody>
</table>
<div class="total">Total: R$ <span th:text="${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}"></span></div>
</body>
</html>
